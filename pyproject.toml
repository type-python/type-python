[build-system]
requires = ["setuptools>=77"]
build-backend = "setuptools.build_meta"

[project]
name = "type-python"
version = "0.0.1"
description = "Minimal package for the PyPI name type-python"
readme = "README.md"
requires-python = ">=3.9"
authors = [
  { name = "unadlib" }
]

[tool.setuptools]
py-modules = ["type_python"]