name: publish

on:
  release:
    types:
      - published

permissions:
  contents: read

concurrency:
  group: publish-${{ github.event.release.tag_name }}
  cancel-in-progress: false

jobs:
  validate-release:
    runs-on: ubuntu-24.04

    steps:
      - name: Check out release tag
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.release.tag_name }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Validate release tag format and package version
        shell: bash
        run: |
          set -euo pipefail

          tag="${{ github.event.release.tag_name }}"
          if [[ ! "$tag" =~ ^v[0-9].+ ]]; then
            echo "Release tag must start with v and match the package version, for example v0.1.0"
            exit 1
          fi

          expected_version="${tag#v}"
          package_version="$(python -c 'from pathlib import Path; import tomllib; print(tomllib.loads(Path("pyproject.toml").read_text())["project"]["version"])')"

          if [[ "$package_version" != "$expected_version" ]]; then
            echo "Release tag ${tag} does not match pyproject.toml version ${package_version}"
            exit 1
          fi

  build-sdist:
    needs: validate-release
    runs-on: ubuntu-24.04

    steps:
      - name: Check out release tag
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.release.tag_name }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install packaging tools
        run: python -m pip install --upgrade build twine

      - name: Build Python source distribution artifact
        run: python -m build --sdist

      - name: Validate Python distribution metadata
        run: python -m twine check dist/*

      - name: Upload source distribution artifact
        uses: actions/upload-artifact@v7
        with:
          name: python-distribution-sdist
          path: dist/*.tar.gz
          if-no-files-found: error

  build-wheels:
    needs: validate-release
    strategy:
      fail-fast: false
      matrix:
        include:
          - target_name: linux-x86_64
            runner: ubuntu-24.04
            cibw_archs: x86_64
            artifact_name: python-distribution-linux-x86_64
          - target_name: windows-amd64
            runner: windows-2025
            cibw_archs: AMD64
            artifact_name: python-distribution-windows-amd64
          - target_name: macos-x86_64
            runner: macos-15-intel
            cibw_archs: x86_64
            artifact_name: python-distribution-macos-x86_64
          - target_name: macos-arm64
            runner: macos-15
            cibw_archs: arm64
            artifact_name: python-distribution-macos-arm64
    runs-on: ${{ matrix.runner }}

    steps:
      - name: Check out release tag
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.release.tag_name }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Rust 1.94.0 on macOS
        if: runner.os == 'macOS'
        shell: bash
        run: ./scripts/bootstrap-rust.sh

      - name: Install Rust 1.94.0 on Windows
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          if (-not (Get-Command rustup -ErrorAction SilentlyContinue)) {
            Invoke-WebRequest `
              -Uri "https://static.rust-lang.org/rustup/dist/x86_64-pc-windows-msvc/rustup-init.exe" `
              -OutFile "rustup-init.exe"
            .\rustup-init.exe -y --profile minimal --default-toolchain 1.94.0
            "$env:USERPROFILE\.cargo\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
            $env:PATH = "$env:USERPROFILE\.cargo\bin;$env:PATH"
          }

          rustup toolchain install 1.94.0 --profile minimal
          rustup default 1.94.0
          rustc --version
          cargo --version

      - name: Install wheel build tools
        shell: bash
        run: python -m pip install --upgrade pip twine "cibuildwheel==3.4.1"

      - name: Build wheel artifacts
        shell: bash
        env:
          CIBW_ARCHS: ${{ matrix.cibw_archs }}
        run: python -m cibuildwheel --output-dir wheelhouse

      - name: Validate wheel metadata
        shell: bash
        run: python -m twine check wheelhouse/*.whl

      - name: Upload wheel artifacts
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact_name }}
          path: wheelhouse/*.whl
          if-no-files-found: error

  publish:
    needs:
      - build-sdist
      - build-wheels
    runs-on: ubuntu-24.04
    environment:
      name: pypi
      url: https://pypi.org/project/type-python/
    permissions:
      id-token: write

    steps:
      - name: Download source distribution artifact
        uses: actions/download-artifact@v4
        with:
          name: python-distribution-sdist
          path: dist

      - name: Download Linux wheel artifacts
        uses: actions/download-artifact@v4
        with:
          name: python-distribution-linux-x86_64
          path: dist

      - name: Download Windows wheel artifacts
        uses: actions/download-artifact@v4
        with:
          name: python-distribution-windows-amd64
          path: dist

      - name: Download macOS x86_64 wheel artifacts
        uses: actions/download-artifact@v4
        with:
          name: python-distribution-macos-x86_64
          path: dist

      - name: Download macOS arm64 wheel artifacts
        uses: actions/download-artifact@v4
        with:
          name: python-distribution-macos-arm64
          path: dist

      - name: Publish distribution artifacts to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
