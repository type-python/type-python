name: rust

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  workspace-fast:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Rust 1.94.0
        run: |
          rustup toolchain install 1.94.0 --profile minimal \
            --component rustfmt \
            --component clippy
          rustup default 1.94.0

      - name: Format
        run: cargo fmt --all --check

      - name: Lint
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Test Fast Workspace Suite
        run: 'cargo test --workspace -- --skip tests::verification::'

      - name: Bench compile check
        run: cargo bench --workspace --no-run

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install packaging tools
        run: python -m pip install --upgrade build twine

      - name: Install downstream checker smoke tools
        run: python -m pip install --upgrade mypy pyright

      - name: Run downstream checker smoke test
        run: python scripts/downstream_checker_smoke.py

      - name: Build Python distribution artifacts
        run: python -m build --sdist --wheel

      - name: Validate Python distribution metadata
        run: python -m twine check dist/*

  python-min-supported:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Rust 1.94.0
        run: |
          rustup toolchain install 1.94.0 --profile minimal \
            --component rustfmt \
            --component clippy
          rustup default 1.94.0

      - name: Set up Python 3.9
        uses: actions/setup-python@v5
        with:
          python-version: "3.9"

      - name: Install wheel build tools
        run: python -m pip install --upgrade pip build

      - name: Build wheel with minimum supported Python
        run: python -m build --wheel

      - name: Install built wheel
        run: python -m pip install --force-reinstall dist/*.whl

      - name: Run installed wheel smoke test
        run: python scripts/quickstart_smoke.py

  cli-verification:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Rust 1.94.0
        run: |
          rustup toolchain install 1.94.0 --profile minimal \
            --component rustfmt \
            --component clippy
          rustup default 1.94.0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Test CLI Verification Suite
        run: 'cargo test -p typepython-cli tests::verification::'
