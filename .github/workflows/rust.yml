name: rust

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  workspace-fast:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Rust 1.94.0
        run: |
          rustup toolchain install 1.94.0 --profile minimal \
            --component rustfmt \
            --component clippy
          rustup default 1.94.0

      - name: Format
        run: cargo fmt --all --check

      - name: Lint
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Test Fast Workspace Suite
        run: 'cargo test --workspace -- --skip tests::verification::'

      - name: Bench compile check
        run: cargo bench --workspace --no-run

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install packaging tools
        run: python -m pip install --upgrade build twine

      - name: Install downstream checker smoke tools
        run: python -m pip install --upgrade mypy pyright ty

      - name: Run downstream checker smoke test
        run: python scripts/downstream_checker_smoke.py

      - name: Build Python distribution artifacts
        run: python -m build --sdist --wheel

      - name: Validate Python distribution metadata
        run: python -m twine check dist/*

  python-min-supported:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Rust 1.94.0
        run: |
          rustup toolchain install 1.94.0 --profile minimal \
            --component rustfmt \
            --component clippy
          rustup default 1.94.0

      - name: Set up Python 3.9
        uses: actions/setup-python@v5
        with:
          python-version: "3.9"

      - name: Install wheel build tools
        run: python -m pip install --upgrade pip build

      - name: Build wheel with minimum supported Python
        run: python -m build --wheel

      - name: Install built wheel
        run: python -m pip install --force-reinstall dist/*.whl

      - name: Run installed wheel smoke test
        run: python scripts/quickstart_smoke.py

  python-modern-host:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Rust 1.94.0
        run: |
          rustup toolchain install 1.94.0 --profile minimal \
            --component rustfmt \
            --component clippy
          rustup default 1.94.0

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install wheel build tools
        run: python -m pip install --upgrade pip build

      - name: Build wheel with modern host Python
        run: python -m build --wheel

      - name: Install built wheel
        run: python -m pip install --force-reinstall dist/*.whl

      - name: Run installed wheel smoke test
        run: python scripts/quickstart_smoke.py

  native-target-build-verify:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.13", "3.14"]

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Rust 1.94.0
        run: |
          rustup toolchain install 1.94.0 --profile minimal \
            --component rustfmt \
            --component clippy
          rustup default 1.94.0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install wheel build tools
        run: python -m pip install --upgrade pip build

      - name: Build wheel
        run: python -m build --wheel

      - name: Install built wheel
        run: python -m pip install --force-reinstall dist/*.whl

      - name: Run native target build/verify smoke test
        run: python scripts/native_target_smoke.py --target-python ${{ matrix.python-version }}

  platform-smoke:
    if: github.event_name == 'pull_request'
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macos
            runner: macos-15
          - name: windows
            runner: windows-2025
    runs-on: ${{ matrix.runner }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Rust 1.94.0 on macOS
        if: runner.os == 'macOS'
        shell: bash
        run: ./scripts/bootstrap-rust.sh

      - name: Install Rust 1.94.0 on Windows
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          if (-not (Get-Command rustup -ErrorAction SilentlyContinue)) {
            Invoke-WebRequest `
              -Uri "https://static.rust-lang.org/rustup/dist/x86_64-pc-windows-msvc/rustup-init.exe" `
              -OutFile "rustup-init.exe"
            .\rustup-init.exe -y --profile minimal --default-toolchain 1.94.0
            "$env:USERPROFILE\.cargo\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
            $env:PATH = "$env:USERPROFILE\.cargo\bin;$env:PATH"
          }

          rustup toolchain install 1.94.0 --profile minimal
          rustup default 1.94.0
          rustc --version
          cargo --version

      - name: Install wheel build tools
        shell: bash
        run: python -m pip install --upgrade pip build

      - name: Build wheel
        shell: bash
        run: python -m build --wheel

      - name: Install built wheel
        shell: bash
        run: python -m pip install --force-reinstall dist/*.whl

      - name: Run quickstart smoke test
        shell: bash
        run: python scripts/quickstart_smoke.py

  cli-verification:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Rust 1.94.0
        run: |
          rustup toolchain install 1.94.0 --profile minimal \
            --component rustfmt \
            --component clippy
          rustup default 1.94.0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Test CLI Verification Suite
        run: 'cargo test -p typepython-cli tests::verification::'
